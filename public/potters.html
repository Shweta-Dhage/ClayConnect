<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Potter Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f7f3ef;
}

.navbar{
    background:#6b4f3a;
    color:white;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.logout{
    background:white;
    color:#6b4f3a;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.hero{
    padding:40px;
}

.welcome{
    background:linear-gradient(135deg,#8d6e63,#5d4037);
    color:white;
    padding:40px;
    border-radius:20px;
    margin-bottom:30px;
}

.welcome h1{
    font-size:35px;
}

.stats{
    display:flex;
    gap:20px;
    margin-bottom:30px;
}

.stat-card{
    flex:1;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.form-box{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    margin-bottom:30px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

input,
select,
textarea{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

textarea{
    grid-column:1/3;
    height:120px;
}

.add-btn{
    margin-top:20px;
    background:#8d6e63;
    color:white;
    border:none;
    padding:14px 30px;
    border-radius:10px;
    cursor:pointer;
}

.add-btn:hover{
    background:#5d4037;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-body{
    padding:20px;
}

.price{
    color:#8d6e63;
    font-size:22px;
    font-weight:bold;
    margin:10px 0;
}

.delete{
    width:100%;
    padding:12px;
    background:red;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.delete:hover{
    background:darkred;
}




.badge{
    background:#f1e1d1;
    color:#6b4f3a;
    padding:5px 12px;
    border-radius:20px;
    font-size:12px;
}

/* ================= TOAST ================= */

#toast{
    position:fixed;
    top:30px;
    right:30px;
    padding:15px 25px;
    border-radius:12px;
    color:white;
    font-weight:600;
    z-index:9999;
    opacity:0;
    transform:translateY(-30px);
    transition:0.4s;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

#toast.show{
    opacity:1;
    transform:translateY(0);
}

#toast.success{
    background:#2e7d32;
}

#toast.error{
    background:#d32f2f;
}

/* ================= CARD EFFECT ================= */

.card{
    position:relative;
}

.card::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:4px;
    background:linear-gradient(
        90deg,
        #8d6e63,
        #d7b899
    );
}

/* ================= PRICE ================= */

.price{
    display:inline-block;
    padding:8px 14px;
    background:#f6ebe2;
    border-radius:12px;
}

/* ================= DELETE BUTTON ================= */

.delete{
    margin-top:15px;
    transition:0.3s;
}

.delete:hover{
    transform:scale(1.03);
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){

    .hero{
        padding:20px;
    }

    .stats{
        flex-direction:column;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

    textarea{
        grid-column:auto;
    }

    .navbar{
        padding:15px;
    }

    .logo{
        font-size:22px;
    }

    .welcome h1{
        font-size:28px;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">
        🏺 ClayConnect Potter
    </div>

    <button class="logout" onclick="logout()">
        Logout
    </button>
</div>

<div class="hero">

    <div class="welcome">
        <h1 id="welcome"></h1>
        <p>Manage your handmade pottery products.</p>
    </div>

    <div class="stats">
        <div class="stat-card">
            <h3>Total Products</h3>
            <h1 id="count">0</h1>
        </div>

        <div class="stat-card">
            <h3>Store Owner</h3>
            <h2 id="owner"></h2>
        </div>
    </div>

    <div class="form-box">

        <h2>Add Product</h2>

        <br>

        <div class="form-grid">

            <input id="name" placeholder="Product Name">

            <input id="price" placeholder="Price">

            <input type="file" id="img">

            <select id="category">
                <option value="manipur">Manipur</option>
                <option value="jaipur">Jaipur</option>
                <option value="rajasthan">Rajasthan</option>
                <option value="gujarat">Gujarat</option>
                <option value="kutch">Kutch</option>
                <option value="udaipur">Udaipur</option>
                <option value="maharashtra">Maharashtra</option>
            </select>

            <textarea id="desc"
            placeholder="Description"></textarea>

        </div>

        <button class="add-btn" onclick="addProduct()">
            Add Product
        </button>

    </div>

    <h2>Your Products</h2>
    <br>

    <div class="products" id="list"></div>


</div>
<div id="toast"></div>
<script src="potters.js"></script>

</body>
</html>
