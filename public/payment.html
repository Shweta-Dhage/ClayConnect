<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Clay Connect</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
        }

        .checkout{
            display:flex;
            gap:20px;
            padding:20px;
            max-width:1100px;
            margin:auto;
        }

        .box{
            background:white;
            padding:20px;
            border-radius:10px;
            width:100%;
        }

        .order-card{
            border-bottom:1px solid #ddd;
            padding:10px 0;
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        .pay-btn{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
            font-size:16px;
        }
    </style>
</head>

<body>

<div class="checkout">

    <!-- ORDER SUMMARY -->
    <div class="box">
        <h2>🛒 Order Summary</h2>

        <div id="orderItems"></div>

        <hr>

        <p>Total Items: <span id="totalItems">0</span></p>
        <p>Total Price: <b id="totalPrice">₹0</b></p>
    </div>

    <!-- DELIVERY -->
    <div class="box">
        <h2>📦 Delivery Details</h2>

        <input type="text" id="name" placeholder="Full Name">
        <input type="text" id="phone" placeholder="Phone Number">
        <textarea id="address" placeholder="Full Address"></textarea>

        <button class="pay-btn" onclick="payNow()">
            Pay Now 💳
        </button>
    </div>

</div>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="payment.js"></script>

</body>
</html>
